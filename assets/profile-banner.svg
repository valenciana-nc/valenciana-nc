<svg width="1000" height="360" viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Valenciana</title>
  <desc id="desc">A sunset mountain banner with forest silhouettes and the text A Web Developer in making.</desc>
  <defs>
